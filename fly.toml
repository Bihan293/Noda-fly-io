app = "noda-fly-io"
primary_region = "fra"

[build]

[http_service]
  internal_port = 3000
  force_https = false
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.ports]]
    port = 80
    handlers = ["http"]

  [[http_service.ports]]
    port = 443
    handlers = ["tls", "http"]

# ✅ ЖЁСТКИЙ ФИКС health check
[checks]
  [checks.health]
    port = 3000
    type = "http"
    interval = "15s"
    timeout = "5s"
    path = "/health"

[[vm]]
  memory_mb = 256
  cpu_kind = "shared"
  cpus = 1
